<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName hiltutil.org
  ServerAlias www.hiltutil.org

  DocumentRoot "/var/www/html/hilt"

  <Directory "/var/www/html/hilt">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
  </Directory>

  ErrorLog "/var/log/httpd/hiltutil.org_error.log"
  ServerSignature Off
  CustomLog "/var/log/httpd/hiltutil.org_access.log" combined

SSLCertificateFile /etc/letsencrypt/live/hiltutil.org/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/hiltutil.org/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
