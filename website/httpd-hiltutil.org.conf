# ************************************
# Vhost for Hilt publicity / App Store support site
# hiltutil.org → /var/www/html/hilt
# ************************************
#
<VirtualHost *:80>
  ServerName hiltutil.org
  ServerAlias www.hiltutil.org

  DocumentRoot "/var/www/html/hilt"

  <Directory "/var/www/html/hilt">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
  </Directory>

  ErrorLog "/var/log/httpd/hiltutil.org_error.log"
  ServerSignature Off
  CustomLog "/var/log/httpd/hiltutil.org_access.log" combined
RewriteEngine on
RewriteCond %{SERVER_NAME} =hiltutil.org [OR]
RewriteCond %{SERVER_NAME} =www.hiltutil.org
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
